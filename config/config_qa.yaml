subinfo_fields:
- name: subject_id
  type: int
  constraints:
    min: 101
    max: 999
    digits: 3
subinfo_mapping:
  subject_id: 被试编号（3位）
  Participant Information: 被试信息
  registration_failed: 注册失败
  registration_successful: 注册成功
  invalid_input: '{field} 输入无效'
window:
  size:
  - 1280
  - 720
  units: pix
  screen: 0
  bg_color: gray
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60
task:
  task_name: iowa_gambling
  save_path: ./outputs/qa
  total_blocks: 1
  total_trials: 12
  trial_per_block: 12
  conditions:
  - deck_a
  - deck_b
  - deck_c
  - deck_d
  key_list: &id001
  - d
  - f
  - j
  - k
  - space
  seed_mode: same_across_sub
  delta: 1
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
timing:
  cue_duration: 0.5
  anticipation_duration: 1.0
  prefeedback_duration: 0.4
  feedback_duration: 0.8
stimuli:
  fixation:
    type: text
    text: +
    color: white
    height: 48
    font: SimHei
  instruction_text:
    type: text
    text: '爱荷华博弈任务


      请从四个牌堆中选择一个。

      D=牌堆A，F=牌堆B，J=牌堆C，K=牌堆D。


      按空格键开始。'
    color: white
    height: 28
    wrapWidth: 980
    font: SimHei
  deck_a_cue:
    type: text
    text: 线索：牌堆A
    color: white
    height: 44
    wrapWidth: 900
    font: SimHei
  deck_b_cue:
    type: text
    text: 线索：牌堆B
    color: white
    height: 44
    wrapWidth: 900
    font: SimHei
  deck_c_cue:
    type: text
    text: 线索：牌堆C
    color: white
    height: 44
    wrapWidth: 900
    font: SimHei
  deck_d_cue:
    type: text
    text: 线索：牌堆D
    color: white
    height: 44
    wrapWidth: 900
    font: SimHei
  deck_a_target:
    type: text
    text: '请选择牌堆

      D=A   F=B   J=C   K=D'
    color: white
    height: 54
    wrapWidth: 900
    font: SimHei
  deck_b_target:
    type: text
    text: '请选择牌堆

      D=A   F=B   J=C   K=D'
    color: white
    height: 54
    wrapWidth: 900
    font: SimHei
  deck_c_target:
    type: text
    text: '请选择牌堆

      D=A   F=B   J=C   K=D'
    color: white
    height: 54
    wrapWidth: 900
    font: SimHei
  deck_d_target:
    type: text
    text: '请选择牌堆

      D=A   F=B   J=C   K=D'
    color: white
    height: 54
    wrapWidth: 900
    font: SimHei
  deck_a_hit_feedback:
    type: text
    text: 反应已记录
    color: green
    height: 42
    font: SimHei
  deck_a_miss_feedback:
    type: text
    text: 未在时限内作答
    color: red
    height: 42
    font: SimHei
  deck_b_hit_feedback:
    type: text
    text: 反应已记录
    color: green
    height: 42
    font: SimHei
  deck_b_miss_feedback:
    type: text
    text: 未在时限内作答
    color: red
    height: 42
    font: SimHei
  deck_c_hit_feedback:
    type: text
    text: 反应已记录
    color: green
    height: 42
    font: SimHei
  deck_c_miss_feedback:
    type: text
    text: 未在时限内作答
    color: red
    height: 42
    font: SimHei
  deck_d_hit_feedback:
    type: text
    text: 反应已记录
    color: green
    height: 42
    font: SimHei
  deck_d_miss_feedback:
    type: text
    text: 未在时限内作答
    color: red
    height: 42
    font: SimHei
  block_break:
    type: text
    text: '区块 {block_num}/{total_blocks}

      记录率：{accuracy:.2%}

      当前分数：{total_score}


      按空格键继续'
    color: white
    height: 24
    wrapWidth: 900
    font: SimHei
  good_bye:
    type: text
    text: '任务结束，最终分数：{total_score}


      按空格键退出'
    color: white
    height: 28
    wrapWidth: 900
    font: SimHei
triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    deck_a_cue_onset: 20
    deck_b_cue_onset: 21
    deck_c_cue_onset: 22
    deck_d_cue_onset: 23
    deck_a_anti_onset: 30
    deck_b_anti_onset: 31
    deck_c_anti_onset: 32
    deck_d_anti_onset: 33
    deck_a_target_onset: 40
    deck_b_target_onset: 41
    deck_c_target_onset: 42
    deck_d_target_onset: 43
    deck_a_key_press: 50
    deck_b_key_press: 51
    deck_c_key_press: 52
    deck_d_key_press: 53
    deck_a_no_response: 60
    deck_b_no_response: 61
    deck_c_no_response: 62
    deck_d_no_response: 63
    deck_a_hit_fb_onset: 70
    deck_a_miss_fb_onset: 71
    deck_b_hit_fb_onset: 72
    deck_b_miss_fb_onset: 73
    deck_c_hit_fb_onset: 74
    deck_c_miss_fb_onset: 75
    deck_d_hit_fb_onset: 76
    deck_d_miss_fb_onset: 77
  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
  timing:
    post_delay_ms: 1
  policy:
    strict: false
controller:
  initial_duration: 0.25
  min_duration: 0.08
  max_duration: 0.4
  step: 0.02
  target_accuracy: 0.66
  condition_specific: true
  enable_logging: true
qa:
  output_dir: outputs/qa
  enable_scaling: true
  timing_scale: 0.1
  min_frames: 1
  strict: false
  max_wait_s: 10.0
  acceptance_criteria:
    required_columns:
    - condition
    - block_id
    - trial_index
    - target_key_press
    - target_response
    - target_rt
    expected_trial_count: 12
    allowed_keys: *id001
    triggers_required: true
